<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Firefighter Pup Phase 1 Preview</title>
  <style>
    :root {
      color-scheme: dark;
      font-family: Arial, sans-serif;
      background: #111418;
      color: #f4efe7;
    }

    body {
      margin: 0;
      padding: 24px;
    }

    h1 {
      margin: 0 0 6px;
      font-size: 24px;
      letter-spacing: 0;
    }

    p {
      margin: 0 0 20px;
      color: #aeb7c2;
    }

    .grid {
      display: grid;
      gap: 18px;
    }

    .row {
      border: 1px solid #34404d;
      border-radius: 8px;
      padding: 14px;
      background: #191f26;
    }

    .head {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 10px;
    }

    .name {
      font-weight: 700;
    }

    .status {
      color: #ffcc66;
      font-size: 13px;
    }

    .stage {
      overflow-x: auto;
      padding: 12px;
      border-radius: 6px;
      background:
        linear-gradient(45deg, rgba(255,255,255,0.08) 25%, transparent 25%),
        linear-gradient(-45deg, rgba(255,255,255,0.08) 25%, transparent 25%),
        linear-gradient(45deg, transparent 75%, rgba(255,255,255,0.08) 75%),
        linear-gradient(-45deg, transparent 75%, rgba(255,255,255,0.08) 75%),
        #0f141a;
      background-position: 0 0, 0 8px, 8px -8px, -8px 0;
      background-size: 16px 16px;
    }

    img {
      display: block;
      height: 208px;
      width: auto;
      image-rendering: pixelated;
    }
  </style>
</head>
<body>
  <h1>Firefighter Pup Phase 1 Preview</h1>
  <p>Processed outputs only. Source spritesheet is unchanged.</p>
  <div class="grid">
    <section class="row">
      <div class="head"><span class="name">surprised</span><span class="status">processed draft</span></div>
      <div class="stage"><img src="processed/surprised.png" alt="surprised strip"></div>
    </section>
    <section class="row">
      <div class="head"><span class="name">clap</span><span class="status">processed draft</span></div>
      <div class="stage"><img src="processed/clap.png" alt="clap strip"></div>
    </section>
    <section class="row">
      <div class="head"><span class="name">idle_tail</span><span class="status">processed draft</span></div>
      <div class="stage"><img src="processed/idle_tail.png" alt="idle tail strip"></div>
    </section>
    <section class="row">
      <div class="head"><span class="name">salute</span><span class="status">processed draft</span></div>
      <div class="stage"><img src="processed/salute.png" alt="salute strip"></div>
    </section>
    <section class="row">
      <div class="head"><span class="name">sleepy</span><span class="status">processed draft</span></div>
      <div class="stage"><img src="processed/sleepy.png" alt="sleepy strip"></div>
    </section>
  </div>
</body>
</html>

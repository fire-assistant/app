<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>일구 로딩 미리보기</title>
  <link rel="stylesheet" href="../styles.css">
  <style>
    body {
      max-width: none;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background:
        linear-gradient(rgba(13, 13, 13, 0.58), rgba(13, 13, 13, 0.58)),
        radial-gradient(circle at center, rgba(255, 255, 255, 0.16), transparent 42%),
        #1c1c1c;
      overflow: hidden;
    }
    .ilgu-overlay {
      position: relative;
      inset: auto;
      width: 100vw;
      height: 100vh;
    }
  </style>
</head>
<body>
  <div id="ilgu-loading-overlay" class="ilgu-overlay">
    <div class="ilgu-loader-wrap">
      <div class="ilgu-scene-frame">
        <img class="ilgu-work-scene" src="../assets/loading/ilgu_working.png" alt="일구가 서류를 정리하는 중">
      </div>
      <div class="ilgu-loading-text">
        <span id="ilgu-loading-status">서류를 찾는 중</span>
        <span class="ilgu-dot">.</span><span class="ilgu-dot">.</span><span class="ilgu-dot">.</span>
        <strong id="ilgu-loading-percent">1%</strong>
      </div>
      <div class="ilgu-progress-track" aria-hidden="true">
        <div id="ilgu-loading-bar" class="ilgu-progress-fill"></div>
      </div>
      <p class="ilgu-loading-caption">일구가 열심히 자료를 정리하고 있어요</p>
    </div>
  </div>

  <script>
    const statusEl = document.getElementById("ilgu-loading-status");
    const percentEl = document.getElementById("ilgu-loading-percent");
    const barEl = document.getElementById("ilgu-loading-bar");
    const loadingSteps = [
      { limit: 25, text: "서류를 찾는 중" },
      { limit: 55, text: "자료를 검토하는 중" },
      { limit: 82, text: "결과를 정리하는 중" },
      { limit: 99, text: "마무리 확인 중" },
      { limit: 100, text: "완료" },
    ];

    function runPreview() {
      const duration = 3000 + Math.random() * 3000;
      const start = performance.now();
      let lastPercent = 1;

      function paint(percent) {
        const step = loadingSteps.find((item) => percent <= item.limit) || loadingSteps[loadingSteps.length - 1];
        statusEl.textContent = step.text;
        percentEl.textContent = `${percent}%`;
        barEl.style.width = `${percent}%`;
      }

      function tick(now) {
        const raw = Math.min((now - start) / duration, 1);
        const eased = 1 - Math.pow(1 - raw, 2.35);
        const maxBeforeDone = raw < 1 ? 99 : 100;
        const percent = Math.max(lastPercent, Math.min(maxBeforeDone, Math.floor(eased * 100)));
        lastPercent = percent;
        paint(percent);
        if (raw < 1) requestAnimationFrame(tick);
        else setTimeout(runPreview, 650);
      }

      paint(1);
      requestAnimationFrame(tick);
    }

    runPreview();
  </script>
</body>
</html>

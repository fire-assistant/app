<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>채팅 텍스트 스트리밍</title>
<link rel="preconnect" href="https://cdn.jsdelivr.net" />
<link
  rel="stylesheet"
  href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css"
/>
<style>
  :root {
    --bg: oklch(0.97 0.004 80);
    --bg-2: oklch(0.94 0.006 80);
    --surface: oklch(1 0 0);
    --ink: oklch(0.22 0.012 270);
    --ink-muted: oklch(0.55 0.012 270);
    --line: oklch(0.92 0.006 270);
    --line-soft: oklch(0.95 0.004 270);
    --bubble-in-bg: oklch(0.955 0.005 260);
    --bubble-in-ink: oklch(0.22 0.012 270);
    --bubble-out-bg: oklch(0.42 0.09 258);
    --bubble-out-ink: oklch(0.99 0 0);
    --pill-bg: oklch(0.96 0.005 270);
    --shadow-card:
      0 1px 0 oklch(1 0 0 / 0.7) inset,
      0 30px 60px -22px oklch(0.2 0.05 270 / 0.18),
      0 8px 24px -12px oklch(0.2 0.05 270 / 0.08);
  }

  * {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }

  html,
  body {
    height: 100%;
  }

  body {
    font-family: "Pretendard", -apple-system, BlinkMacSystemFont, "Segoe UI",
      sans-serif;
    background:
      radial-gradient(
        1200px 600px at 80% -10%,
        oklch(0.93 0.02 250 / 0.5),
        transparent 60%
      ),
      radial-gradient(
        900px 500px at 0% 100%,
        oklch(0.95 0.02 60 / 0.6),
        transparent 55%
      ),
      var(--bg);
    color: var(--ink);
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
    word-break: keep-all;
  }

  .app {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: clamp(12px, 2vw, 28px);
  }

  /* Phone container */
  .phone {
    width: 100%;
    max-width: 720px;
    height: min(960px, calc(100vh - 32px));
    background: var(--surface);
    border-radius: 32px;
    overflow: hidden;
    border: 1px solid var(--line);
    display: grid;
    grid-template-rows: auto 1fr auto;
    box-shadow: var(--shadow-card);
  }

  .chat-header {
    display: grid;
    grid-template-columns: auto 1fr auto;
    gap: 12px;
    align-items: center;
    padding: 14px 14px;
    border-bottom: 1px solid var(--line-soft);
    background: var(--surface);
  }

  .icon-btn {
    background: none;
    border: none;
    cursor: pointer;
    width: 34px;
    height: 34px;
    display: grid;
    place-items: center;
    border-radius: 50%;
    color: var(--ink);
  }
  .icon-btn svg {
    width: 20px;
    height: 20px;
    fill: none;
    stroke: currentColor;
    stroke-width: 1.7;
    stroke-linecap: round;
    stroke-linejoin: round;
  }

  .peer {
    display: flex;
    align-items: center;
    gap: 10px;
    min-width: 0;
  }

  .avatar {
    width: 42px;
    height: 42px;
    border-radius: 50%;
    overflow: hidden;
    flex-shrink: 0;
    background: oklch(0.96 0.01 80);
  }
  .avatar img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center 10%;
    image-rendering: -webkit-optimize-contrast;
  }

  .peer-meta {
    min-width: 0;
  }
  .peer-name {
    font-size: 14.5px;
    font-weight: 600;
    letter-spacing: -0.01em;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .peer-status {
    font-size: 11px;
    color: var(--ink-muted);
    margin-top: 1px;
    display: flex;
    align-items: center;
    gap: 5px;
  }
  .peer-status::before {
    content: "";
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: oklch(0.7 0.15 145);
  }

  .header-actions {
    display: flex;
    gap: 2px;
  }

  .messages {
    overflow-y: auto;
    overflow-x: hidden;
    padding: 14px 14px 8px;
    display: flex;
    flex-direction: column;
    gap: 2px;
    scrollbar-width: thin;
    scrollbar-color: oklch(0.85 0.005 270) transparent;
    background: linear-gradient(
      to bottom,
      var(--surface),
      oklch(0.985 0.003 80)
    );
  }
  .messages::-webkit-scrollbar {
    width: 5px;
  }
  .messages::-webkit-scrollbar-thumb {
    background: oklch(0.85 0.005 270);
    border-radius: 999px;
  }

  .day-divider {
    align-self: center;
    font-size: 11px;
    color: var(--ink-muted);
    padding: 8px 0 14px;
    letter-spacing: 0.02em;
  }

  .row {
    display: flex;
    align-items: flex-end;
    gap: 6px;
    max-width: 100%;
    animation: rowIn 0.36s cubic-bezier(0.2, 0.8, 0.2, 1) backwards;
  }
  .row.in {
    justify-content: flex-start;
  }
  .row.out {
    justify-content: flex-end;
  }
  .row.first-of-group {
    margin-top: 12px;
  }
  .row.grouped {
    margin-top: 2px;
  }
  .row:first-child {
    margin-top: 0;
  }

  @keyframes rowIn {
    from {
      opacity: 0;
      transform: translateY(8px) scale(0.985);
    }
    to {
      opacity: 1;
      transform: none;
    }
  }

  .bubble {
    max-width: min(78%, 520px);
    padding: 9px 13px 10px;
    border-radius: 18px;
    font-size: 14.5px;
    line-height: 1.5;
    letter-spacing: -0.005em;
    overflow-wrap: break-word;
    word-break: keep-all;
    white-space: pre-wrap;
    position: relative;
    transition: background-color 0.2s ease;
  }

  .row.in .bubble {
    background: var(--bubble-in-bg);
    color: var(--bubble-in-ink);
    border-bottom-left-radius: 6px;
  }
  .row.out .bubble {
    background: var(--bubble-out-bg);
    color: var(--bubble-out-ink);
    border-bottom-right-radius: 6px;
  }
  .row.grouped.in .bubble {
    border-top-left-radius: 6px;
  }
  .row.grouped.out .bubble {
    border-top-right-radius: 6px;
  }

  .caret {
    display: inline-block;
    width: 1.5px;
    height: 1em;
    background: currentColor;
    margin-left: 1.5px;
    vertical-align: -2px;
    animation: blink 0.9s steps(2) infinite;
    opacity: 0.85;
    border-radius: 1px;
  }
  @keyframes blink {
    50% {
      opacity: 0;
    }
  }

  .bubble.typing {
    display: inline-flex;
    gap: 4px;
    align-items: center;
    padding: 12px 14px;
  }
  .bubble.typing .dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: oklch(0.55 0.012 270);
    animation: dotBounce 1.2s infinite;
    opacity: 0.4;
  }
  .bubble.typing .dot:nth-child(2) {
    animation-delay: 0.15s;
  }
  .bubble.typing .dot:nth-child(3) {
    animation-delay: 0.3s;
  }
  @keyframes dotBounce {
    0%,
    60%,
    100% {
      opacity: 0.4;
      transform: translateY(0);
    }
    30% {
      opacity: 1;
      transform: translateY(-3px);
    }
  }

  .composer {
    padding: 10px 12px 14px;
    border-top: 1px solid var(--line-soft);
    display: grid;
    grid-template-columns: auto 1fr auto;
    gap: 8px;
    align-items: center;
    background: var(--surface);
  }
  .composer .icon-btn {
    color: var(--ink-muted);
    width: 36px;
    height: 36px;
  }
  .composer .icon-btn.send {
    color: var(--bubble-out-bg);
    transition: transform 0.18s ease;
  }
  .composer .icon-btn.send.active {
    color: var(--bubble-out-bg);
    transform: scale(1.05);
  }

  .input-pill {
    background: var(--pill-bg);
    border: 1px solid transparent;
    border-radius: 22px;
    padding: 10px 14px;
    font-size: 13.5px;
    line-height: 1.4;
    color: var(--ink-muted);
    min-height: 40px;
    display: flex;
    align-items: center;
    transition:
      border-color 0.18s ease,
      background-color 0.18s ease;
  }
  .input-pill.typing {
    color: var(--ink);
    border-color: oklch(0.85 0.012 260);
    background: oklch(0.985 0.003 80);
  }
  .input-pill .caret {
    background: var(--ink);
  }

  /* ==================================================
     Glitch transition
     ================================================== */
  .stage {
    position: relative;
    isolation: isolate;
  }

  .next-frame {
    position: fixed;
    inset: 0;
    z-index: 0;
    background: var(--bg);
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s linear;
  }
  .next-frame iframe {
    width: 100%;
    height: 100%;
    border: 0;
    display: block;
  }
  .stage.transition-on .next-frame {
    opacity: 1;
  }
  .stage.transition-done .next-frame {
    pointer-events: auto;
  }

  .app {
    position: relative;
    z-index: 2;
    will-change: transform, filter, mask-image;
    transition: opacity 0.2s linear;
  }

  .stage.transition-on .app {
    -webkit-mask-image: var(--glitch-mask, none);
            mask-image: var(--glitch-mask, none);
    -webkit-mask-size: 100% 100%;
            mask-size: 100% 100%;
    -webkit-mask-repeat: no-repeat;
            mask-repeat: no-repeat;
    transform: var(--glitch-transform, none);
    filter: var(--glitch-filter, none);
  }

  .stage.transition-done .app {
    opacity: 0;
    pointer-events: none;
  }

  /* Full-screen FX overlays */
  .fx {
    position: fixed;
    inset: 0;
    z-index: 5;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.3s ease;
  }
  .stage.transition-on .fx,
  .stage.transition-done .fx {
    opacity: 1;
  }
  .stage.transition-fade .fx {
    opacity: 0;
  }

  .fx-scan {
    position: absolute;
    inset: 0;
    background-image: repeating-linear-gradient(
      to bottom,
      rgba(0, 0, 0, 0) 0,
      rgba(0, 0, 0, 0) 2px,
      rgba(0, 0, 0, 0.22) 2px,
      rgba(0, 0, 0, 0.22) 3px
    );
    mix-blend-mode: multiply;
    opacity: var(--fx-scan, 0);
  }

  .fx-noise {
    position: absolute;
    inset: -10%;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='240' height='240'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.95' numOctaves='2' stitchTiles='stitch'/><feColorMatrix values='0 0 0 0 0.55 0 0 0 0 0.15 0 0 0 0 0.85 0 0 0 1 0'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>");
    background-size: 280px 280px;
    mix-blend-mode: screen;
    opacity: var(--fx-noise, 0);
    animation: noiseShift 0.09s steps(3) infinite;
  }

  @keyframes noiseShift {
    0%   { transform: translate(0, 0); }
    33%  { transform: translate(-6px, 4px); }
    66%  { transform: translate(8px, -3px); }
    100% { transform: translate(-2px, 6px); }
  }

  .fx-tear {
    position: absolute;
    inset: 0;
    background:
      linear-gradient(
        180deg,
        transparent 0%,
        transparent 40%,
        rgba(180, 80, 230, 0.18) 40%,
        rgba(180, 80, 230, 0.18) 41%,
        transparent 41%,
        transparent 70%,
        rgba(80, 220, 230, 0.16) 70%,
        rgba(80, 220, 230, 0.16) 71.5%,
        transparent 71.5%
      );
    mix-blend-mode: screen;
    opacity: var(--fx-tear, 0);
  }

  .fx-flash {
    position: absolute;
    inset: 0;
    background: white;
    opacity: var(--fx-flash, 0);
    mix-blend-mode: difference;
  }

  /* Counter — bottom-right monospace ticker */
  .glitch-counter {
    position: fixed;
    right: clamp(14px, 3vw, 36px);
    bottom: clamp(14px, 3vw, 36px);
    z-index: 6;
    font-family: "JetBrains Mono", ui-monospace, "SFMono-Regular", Menlo,
      Consolas, monospace;
    font-size: clamp(12px, 1.1vw, 14px);
    font-weight: 500;
    letter-spacing: 0.04em;
    color: oklch(0.78 0.15 305);
    text-shadow:
      0 0 8px oklch(0.7 0.18 305 / 0.6),
      1px 0 0 oklch(0.7 0.2 25 / 0.5),
      -1px 0 0 oklch(0.7 0.2 200 / 0.5);
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s linear;
    font-variant-numeric: tabular-nums;
  }
  .stage.transition-on .glitch-counter,
  .stage.transition-done .glitch-counter {
    opacity: 1;
  }
  .stage.transition-fade .glitch-counter {
    opacity: 0;
  }
  .glitch-counter::before {
    content: "";
    display: inline-block;
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: oklch(0.7 0.2 25);
    margin-right: 8px;
    vertical-align: 1px;
    animation: counterBlink 0.6s steps(2) infinite;
    box-shadow: 0 0 6px oklch(0.7 0.2 25 / 0.8);
  }
  @keyframes counterBlink {
    50% { opacity: 0.2; }
  }

  /* Mobile full-screen */
  @media (max-width: 520px) {
    .app {
      padding: 0;
    }
    .phone {
      max-width: 100%;
      height: 100vh;
      border-radius: 0;
      border: none;
      box-shadow: none;
    }
  }
</style>
</head>
<body>
  <div class="stage" id="stage">
  <div class="next-frame" id="nextFrame">
    <iframe id="introFrame" title="intro" loading="eager" srcdoc="<body style='margin:0;background:#f7f6f3;height:100vh;'></body>"></iframe>
  </div>
  <div class="app">
    <section class="phone" aria-label="채팅 미리보기">
      <header class="chat-header">
        <button class="icon-btn" aria-label="뒤로가기">
          <svg viewBox="0 0 24 24"><path d="M15 18l-6-6 6-6" /></svg>
        </button>
        <div class="peer">
          <div class="avatar" aria-hidden="true"><img src="ilgu.png" alt="김일구 반장님" /></div>
          <div class="peer-meta">
            <div class="peer-name">김일구 반장님</div>
            <div class="peer-status">활동 중</div>
          </div>
        </div>
        <div class="header-actions">
          <button class="icon-btn" aria-label="음성 통화">
            <svg viewBox="0 0 24 24">
              <path
                d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.13.96.37 1.9.7 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.91.33 1.85.57 2.81.7A2 2 0 0 1 22 16.92z"
              />
            </svg>
          </button>
          <button class="icon-btn" aria-label="영상 통화">
            <svg viewBox="0 0 24 24">
              <polygon points="23 7 16 12 23 17 23 7" />
              <rect x="1" y="5" width="15" height="14" rx="2" ry="2" />
            </svg>
          </button>
        </div>
      </header>

      <main class="messages" id="messages" aria-live="polite">
        <div class="day-divider">오늘 · 오후 4:32</div>
      </main>

      <footer class="composer">
        <button class="icon-btn" aria-label="첨부">
          <svg viewBox="0 0 24 24">
            <path
              d="M21.44 11.05l-9.19 9.19a6 6 0 1 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 1 1-2.83-2.83l8.49-8.48"
            />
          </svg>
        </button>
        <div class="input-pill" id="composer">메시지 입력...</div>
        <button class="icon-btn send" id="sendBtn" aria-label="전송">
          <svg viewBox="0 0 24 24">
            <line x1="22" y1="2" x2="11" y2="13" />
            <polygon points="22 2 15 22 11 13 2 9 22 2" />
          </svg>
        </button>
      </footer>
    </section>
  </div>
  <div class="fx" id="fx" aria-hidden="true">
    <div class="fx-tear"></div>
    <div class="fx-noise"></div>
    <div class="fx-scan"></div>
    <div class="fx-flash"></div>
  </div>
  <div class="glitch-counter" id="counter" aria-hidden="true">SIG — 0000.000</div>
  </div>

  <script>
    // ---------- Conversation script ----------
    const conversation = [
      {
        from: "in",
        text: "안전관리자 신고기한 또 놓쳤네. 선임신고 기한 며칠인지 너 기억나?",
      },
      { from: "out", text: "까먹었네 숫자들이 많아서 맨날 헷갈리는 것 같아." },
      { from: "in", text: "자체점검도 그렇고 알아야 하는 법이 한 두개가 아냐..." },
      {
        from: "out",
        text:
          "법제처에서 법을 보라고 선배님들이 그러시는데, 어디서 찾아야 할지도 모르겠어 워낙 복잡하기도 하고",
      },
      { from: "in", text: "그러게... 매번 법령 뒤지는 것도 한계가 있고" },
      { from: "out", text: "뭐 어떻게 하겠어. 방법이 없지." },
    ];

    const messagesEl = document.getElementById("messages");
    const composerEl = document.getElementById("composer");
    const sendBtn = document.getElementById("sendBtn");

    // ---------- Cancellable async helpers ----------
    let runToken = 0;

    function sleep(ms, token) {
      return new Promise((resolve, reject) => {
        const t = setTimeout(() => {
          if (token !== runToken) return reject(new Error("aborted"));
          resolve();
        }, ms);
      });
    }

    function scrollMessagesToBottom() {
      // Smooth-ish scroll using direct property (no scrollIntoView)
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    // ---------- DOM builders ----------
    function makeRow(from, isFirstOfGroup) {
      const row = document.createElement("div");
      row.className = `row ${from} ${isFirstOfGroup ? "first-of-group" : "grouped"}`;
      return row;
    }

    function makeTypingBubble() {
      const b = document.createElement("div");
      b.className = "bubble typing";
      b.innerHTML =
        '<span class="dot"></span><span class="dot"></span><span class="dot"></span>';
      return b;
    }

    function makeBubble() {
      const b = document.createElement("div");
      b.className = "bubble";
      return b;
    }

    function makeCaret() {
      const c = document.createElement("span");
      c.className = "caret";
      return c;
    }

    // ---------- Streaming ----------
    async function streamIntoBubble(bubble, text, basePerChar, token) {
      // text node we keep growing + caret at the end
      const textNode = document.createTextNode("");
      const caret = makeCaret();
      bubble.textContent = "";
      bubble.appendChild(textNode);
      bubble.appendChild(caret);

      for (let i = 0; i < text.length; i++) {
        if (token !== runToken) throw new Error("aborted");
        const ch = text[i];
        textNode.data += ch;
        scrollMessagesToBottom();

        let delay = basePerChar;
        if (ch === " ") delay *= 0.5;
        if (ch === "." || ch === "?" || ch === "!" || ch === ",") delay *= 2.6;
        if (ch === "\n") delay *= 3;
        // small natural jitter
        delay += (Math.random() - 0.5) * basePerChar * 0.5;
        await sleep(Math.max(8, delay), token);
      }
      caret.remove();
    }

    async function typeIntoComposer(text, basePerChar, token) {
      composerEl.classList.add("typing");
      composerEl.textContent = "";
      const textNode = document.createTextNode("");
      const caret = makeCaret();
      composerEl.appendChild(textNode);
      composerEl.appendChild(caret);

      for (let i = 0; i < text.length; i++) {
        if (token !== runToken) throw new Error("aborted");
        textNode.data += text[i];
        let delay = basePerChar + (Math.random() - 0.5) * basePerChar * 0.6;
        if (text[i] === " ") delay *= 0.45;
        await sleep(Math.max(10, delay), token);
      }
      caret.remove();
    }

    function clearComposer() {
      composerEl.classList.remove("typing");
      composerEl.textContent = "메시지 입력...";
    }

    function flashSend() {
      sendBtn.classList.add("active");
      setTimeout(() => sendBtn.classList.remove("active"), 220);
    }

    // ---------- Reading time ----------
    function readingDelay(text) {
      // Korean reading: ~40ms / char baseline, w/ floor + ceiling
      return Math.min(1200, Math.max(500, text.length * 40));
    }

    // ---------- Main loop ----------
    async function play() {
      const token = ++runToken;

      // Reset DOM
      messagesEl.querySelectorAll(".row").forEach((n) => n.remove());
      clearComposer();
      messagesEl.scrollTop = 0;

      // Initial pause
      try {
        await sleep(350, token);
      } catch {
        return;
      }

      let prevFrom = null;

      for (let i = 0; i < conversation.length; i++) {
        if (token !== runToken) return;
        const msg = conversation[i];
        const isFirstOfGroup = msg.from !== prevFrom;

        if (msg.from === "in") {
          // Show typing indicator first
          const row = makeRow("in", isFirstOfGroup);
          const typing = makeTypingBubble();
          row.appendChild(typing);
          messagesEl.appendChild(row);
          scrollMessagesToBottom();

          const typingDuration = Math.min(
            1200,
            700 + Math.min(msg.text.length, 40) * 28
          );
          try {
            await sleep(typingDuration, token);
          } catch {
            return;
          }

          // Replace typing with actual bubble that streams text
          const bubble = makeBubble();
          row.replaceChild(bubble, typing);
          try {
            await streamIntoBubble(bubble, msg.text, 48, token);
          } catch {
            return;
          }
        } else {
          // Outgoing — type into composer
          try {
            await sleep(150, token);
          } catch {
            return;
          }
          try {
            await typeIntoComposer(msg.text, 58, token);
          } catch {
            return;
          }
          try {
            await sleep(250, token);
          } catch {
            return;
          }

          // "Send" — full bubble pops in instantly
          flashSend();
          const row = makeRow("out", isFirstOfGroup);
          const bubble = makeBubble();
          bubble.textContent = msg.text;
          row.appendChild(bubble);
          messagesEl.appendChild(row);
          clearComposer();
          scrollMessagesToBottom();
        }

        prevFrom = msg.from;

        // Reading time before next message
        if (i < conversation.length - 1) {
          try {
            await sleep(readingDelay(msg.text), token);
          } catch {
            return;
          }
        }
      }

      // After conversation ends, glitch transition into the next screen
      try {
        await sleep(1000, token);
      } catch {
        return;
      }
      if (token === runToken) {
        await runGlitchTransition(token);
        if (token !== runToken) return;
        // Now load intro.html fresh from 0 (replaces the black srcdoc)
        try { localStorage.removeItem("fire-intro:t"); } catch {}
        introFrame.removeAttribute("srcdoc");
        introFrame.src = "intro.html";
        // intro.html duration = 46s, notify parent to close overlay after it ends
        setTimeout(() => {
          try { window.parent.postMessage({ type: 'INTRO_DONE' }, '*'); } catch {}
        }, 46500);
      }
    }

    // ---------- Glitch transition ----------
    const stage = document.getElementById("stage");
    const fxEl = document.getElementById("fx");
    const counterEl = document.getElementById("counter");
    const introFrame = document.getElementById("introFrame");

    // Preload the intro iframe (kick it off after a short delay so it's warm)
    let introLoaded = false;
    function preloadIntro() {
      if (introFrame.src.indexOf("intro.html") === -1) {
        try { localStorage.removeItem("fire-intro:t"); } catch {}
        introFrame.src = "intro.html";
      }
      introFrame.addEventListener(
        "load",
        () => {
          introLoaded = true;
        },
        { once: true }
      );
    }
    // preload removed — intro.html is loaded fresh at glitch start to avoid background CPU drain

    function buildSliceMask(intensity, holeProb, seed) {
      // Build an SVG mask URL with horizontal stripes:
      //   white = visible chat   |  black = revealed (iframe shows through)
      // intensity: 0..1 ramps up clip count.
      const rng = mulberry32(seed);
      const stripeCount = 90;
      const rects = [];
      let y = 0;
      const maxY = 100;
      for (let i = 0; i < stripeCount && y < maxY; i++) {
        const h = 0.4 + rng() * 4.5;
        const isHole =
          rng() < holeProb * intensity ||
          (rng() < intensity * 0.4 && intensity > 0.5);
        const fill = isHole ? "black" : "white";
        rects.push(
          `<rect x='0' y='${y.toFixed(2)}' width='100' height='${h.toFixed(
            2
          )}' fill='${fill}'/>`
        );
        y += h;
      }
      // Top-half mostly visible early, bottom more shredded
      const svg =
        `<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100' preserveAspectRatio='none'>` +
        rects.join("") +
        `</svg>`;
      return `url("data:image/svg+xml;utf8,${encodeURIComponent(svg)}")`;
    }

    function mulberry32(a) {
      return function () {
        a |= 0;
        a = (a + 0x6d2b79f5) | 0;
        let t = a;
        t = Math.imul(t ^ (t >>> 15), t | 1);
        t ^= t + Math.imul(t ^ (t >>> 7), t | 61);
        return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
      };
    }

    function rndSign() {
      return Math.random() < 0.5 ? -1 : 1;
    }

    function setCounter(value, glitchy) {
      // Format like the reference: descending negative number with 3 decimals
      const v = value.toFixed(3);
      counterEl.textContent = `SIG — ${v}`;
      if (glitchy && Math.random() < 0.18) {
        // Occasional glyph corruption
        const arr = counterEl.textContent.split("");
        for (let i = 0; i < 3; i++) {
          const idx = 6 + Math.floor(Math.random() * (arr.length - 6));
          arr[idx] = String.fromCharCode(
            33 + Math.floor(Math.random() * 90)
          );
        }
        counterEl.textContent = arr.join("");
      }
    }

    async function runGlitchTransition(token) {
      stage.classList.add("transition-on");
      counterEl.style.opacity = "0";

      const startTs = performance.now();
      const totalMs = 5200; // longer for very gradual build-up
      let counterValue = -2153.934;
      let lastFrame = startTs;
      let raf;

      // Animate via rAF so we get smooth-but-jittery effects
      const tick = () => {
        if (token !== runToken) return;
        const now = performance.now();
        const elapsed = now - startTs;
        const p = Math.min(1, elapsed / totalMs);

        // 지...지직..지지직...지지지지지직: short quiet intro, then noticeable build
        const intensity =
          p < 0.2  ? (p / 0.2) * 0.13                          // 0 → 0.13 (sparse but visible)
          : p < 0.6  ? 0.13 + ((p - 0.2) / 0.4) * 0.27        // 0.13 → 0.40 (building)
          :             0.40 + ((p - 0.6) / 0.4) * 0.60;       // 0.40 → 1.0 (full blast)

        // fire probability: rare at start, every frame at end
        const fireProb = Math.min(0.97, intensity * 2.2);
        const fires = Math.random() < fireProb;

        if (!fires) {
          // rest frame — clear everything
          stage.style.setProperty("--glitch-transform", "none");
          stage.style.setProperty("--glitch-filter", "none");
          stage.style.removeProperty("--glitch-mask");
          fxEl.style.setProperty("--fx-noise", "0");
          fxEl.style.setProperty("--fx-scan",  "0");
          fxEl.style.setProperty("--fx-tear",  "0");
          fxEl.style.setProperty("--fx-flash", "0");
          if (p < 1) { raf = requestAnimationFrame(tick); }
          return;
        }

        const holeProb = 0.05 + intensity * 0.55;

        // Random chunky shake
        const shakeX =
          (Math.random() - 0.5) * 22 * intensity * (Math.random() < 0.7 ? 1 : 3);
        const shakeY = (Math.random() - 0.5) * 8 * intensity;
        const skew = (Math.random() - 0.5) * 1.6 * intensity;
        const scale = 1 + (Math.random() - 0.5) * 0.02 * intensity;

        // RGB split via stacked drop-shadows
        const sep = (4 + Math.random() * 10) * intensity;
        const sepY = (Math.random() - 0.5) * 4 * intensity;
        const filter = `
          drop-shadow(${sep.toFixed(1)}px ${sepY.toFixed(
          1
        )}px 0 rgba(255, 30, 90, ${(0.55 * intensity).toFixed(2)}))
          drop-shadow(${(-sep).toFixed(1)}px ${(-sepY).toFixed(
          1
        )}px 0 rgba(40, 220, 255, ${(0.55 * intensity).toFixed(2)}))
          contrast(${(1 + intensity * 0.25).toFixed(2)})
          saturate(${(1 + intensity * 0.6).toFixed(2)})
        `;

        // Update mask occasionally (every other frame is fine)
        if (Math.random() < 0.85) {
          const seed = (Math.random() * 1e9) | 0;
          const mask = buildSliceMask(intensity, holeProb, seed);
          stage.style.setProperty("--glitch-mask", mask);
        }
        stage.style.setProperty(
          "--glitch-transform",
          `translate(${shakeX.toFixed(
            1
          )}px, ${shakeY.toFixed(1)}px) skewX(${skew.toFixed(
            2
          )}deg) scale(${scale.toFixed(3)})`
        );
        stage.style.setProperty("--glitch-filter", filter);

        // FX overlays
        fxEl.style.setProperty("--fx-noise", (intensity * 0.55).toFixed(2));
        fxEl.style.setProperty("--fx-scan", (intensity * 0.85).toFixed(2));
        fxEl.style.setProperty("--fx-tear", (intensity * 0.7).toFixed(2));
        fxEl.style.setProperty(
          "--fx-flash",
          Math.random() < 0.04 * intensity ? 0.7 : 0
        );

        // Counter ticking — descending fast, visible only from midpoint
        if (p >= 0.5) counterEl.style.opacity = "";
        const dt = (now - lastFrame) / 1000;
        lastFrame = now;
        counterValue -= 25 + Math.random() * 90 * intensity;
        setCounter(counterValue, intensity > 0.4);

        if (p < 1) {
          raf = requestAnimationFrame(tick);
        }
      };
      raf = requestAnimationFrame(tick);

      try {
        await sleep(totalMs, token);
      } catch {
        cancelAnimationFrame(raf);
        return;
      }
      cancelAnimationFrame(raf);
      if (token !== runToken) return;

      // Done — pin the chat hidden, leave a faint residual glitch
      stage.classList.add("transition-done");
      stage.style.setProperty("--glitch-transform", "none");
      stage.style.setProperty("--glitch-filter", "none");
      stage.style.setProperty("--glitch-mask", "none");

      // Residual scanline / noise that fades after a moment
      fxEl.style.setProperty("--fx-noise", "0.18");
      fxEl.style.setProperty("--fx-scan", "0.4");
      fxEl.style.setProperty("--fx-tear", "0");
      fxEl.style.setProperty("--fx-flash", "0");

      // Brief residual ticker
      let resTick = 0;
      const resInterval = setInterval(() => {
        if (token !== runToken) {
          clearInterval(resInterval);
          return;
        }
        counterValue -= 5 + Math.random() * 10;
        setCounter(counterValue, false);
        resTick++;
      }, 90);

      try {
        await sleep(900, token);
      } catch {
        clearInterval(resInterval);
        return;
      }
      clearInterval(resInterval);
      if (token !== runToken) return;

      // Fade FX out fully, leaving the next frame clean
      stage.classList.add("transition-fade");
      fxEl.style.setProperty("--fx-noise", "0");
      fxEl.style.setProperty("--fx-scan", "0");
    }

    function resetStage() {
      stage.classList.remove(
        "transition-on",
        "transition-done",
        "transition-fade"
      );
      stage.style.removeProperty("--glitch-mask");
      stage.style.removeProperty("--glitch-transform");
      stage.style.removeProperty("--glitch-filter");
      fxEl.style.setProperty("--fx-noise", "0");
      fxEl.style.setProperty("--fx-scan", "0");
      fxEl.style.setProperty("--fx-tear", "0");
      fxEl.style.setProperty("--fx-flash", "0");
    }

    const replayBtn = document.getElementById("replay");
    if (replayBtn) {
      replayBtn.addEventListener("click", () => {
        resetStage();
        play();
      });
    }

    // Kick off
    play();
  </script>
</body>
</html>

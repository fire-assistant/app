<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>예방업무 어시스턴트 — 소개 애니메이션</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { background: #050505; overflow: hidden; height: 100%; width: 100%; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif; }
    #root { position: fixed; inset: 0; }
  </style>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>

<script type="text/babel">
// ── animations (Stage / Sprite / Easing) ────────────────────────────────────
const Easing = {
  linear: (t) => t,
  easeInQuad: (t) => t * t,
  easeOutQuad: (t) => t * (2 - t),
  easeInOutQuad: (t) => (t < 0.5 ? 2 * t * t : -1 + (4 - 2 * t) * t),
  easeInCubic: (t) => t * t * t,
  easeOutCubic: (t) => (--t) * t * t + 1,
  easeInOutCubic: (t) => (t < 0.5 ? 4 * t * t * t : (t - 1) * (2 * t - 2) * (2 * t - 2) + 1),
  easeInSine: (t) => 1 - Math.cos((t * Math.PI) / 2),
  easeOutSine: (t) => Math.sin((t * Math.PI) / 2),
};
const clamp = (v, min, max) => Math.max(min, Math.min(max, v));
const isAdminMode = (() => {
  try {
    const params = new URLSearchParams(window.location.search);
    if (params.get('admin') === '1') return true;
    if (localStorage.getItem('fire-admin-mode') === '1') return true;
    return localStorage.getItem('devMode') === 'true';
  } catch {
    return false;
  }
})();

const TimelineContext = React.createContext({ time: 0, duration: 10, playing: false });
const useTime = () => React.useContext(TimelineContext).time;
const useTimeline = () => React.useContext(TimelineContext);

const SpriteContext = React.createContext({ localTime: 0, progress: 0, duration: 0 });
const useSprite = () => React.useContext(SpriteContext);

function Sprite({ start = 0, end = Infinity, children, keepMounted = false }) {
  const { time } = useTimeline();
  const visible = time >= start && time <= end;
  if (!visible && !keepMounted) return null;
  const duration = end - start;
  const localTime = Math.max(0, time - start);
  const progress = duration > 0 && isFinite(duration) ? clamp(localTime / duration, 0, 1) : 0;
  const value = { localTime, progress, duration, visible };
  return (
    <SpriteContext.Provider value={value}>
      {typeof children === 'function' ? children(value) : children}
    </SpriteContext.Provider>
  );
}

function Stage({
  width = 1280, height = 720, duration = 10,
  background = '#f6f4ef', loop = true, autoplay = true,
  persistKey = 'animstage', onComplete, children,
}) {
  const [time, setTime] = React.useState(() => {
    try {
      const v = parseFloat(localStorage.getItem(persistKey + ':t') || '0');
      return isFinite(v) ? clamp(v, 0, duration) : 0;
    } catch { return 0; }
  });
  const [playing, setPlaying] = React.useState(autoplay);
  const [hoverTime, setHoverTime] = React.useState(null);
  const [scale, setScale] = React.useState(1);

  const stageRef = React.useRef(null);
  const rafRef = React.useRef(null);
  const lastTsRef = React.useRef(null);
  const completedRef = React.useRef(false);

  React.useEffect(() => {
    try { localStorage.setItem(persistKey + ':t', String(time)); } catch {}
  }, [time, persistKey]);

  React.useEffect(() => {
    if (!stageRef.current) return;
    const el = stageRef.current;
    const measure = () => {
      const barH = isAdminMode ? 44 : 0;
      const s = Math.min(
        el.clientWidth / width,
        (el.clientHeight - barH) / height
      );
      setScale(Math.max(0.05, s));
    };
    measure();
    const ro = new ResizeObserver(measure);
    ro.observe(el);
    window.addEventListener('resize', measure);
    return () => { ro.disconnect(); window.removeEventListener('resize', measure); };
  }, [width, height]);

  React.useEffect(() => {
    if (!playing) { lastTsRef.current = null; return; }
    const step = (ts) => {
      if (lastTsRef.current == null) lastTsRef.current = ts;
      const dt = (ts - lastTsRef.current) / 1000;
      lastTsRef.current = ts;
      setTime((t) => {
        let next = t + dt;
        if (next >= duration) {
          if (loop) next = next % duration;
          else { next = duration; setPlaying(false); }
        }
        return next;
      });
      rafRef.current = requestAnimationFrame(step);
    };
    rafRef.current = requestAnimationFrame(step);
    return () => { if (rafRef.current) cancelAnimationFrame(rafRef.current); lastTsRef.current = null; };
  }, [playing, duration, loop]);

  React.useEffect(() => {
    const onKey = (e) => {
      if (e.target && (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA')) return;
      if (e.code === 'Space') { e.preventDefault(); setPlaying(p => !p); }
      else if (e.code === 'ArrowLeft') setTime(t => clamp(t - (e.shiftKey ? 1 : 0.1), 0, duration));
      else if (e.code === 'ArrowRight') setTime(t => clamp(t + (e.shiftKey ? 1 : 0.1), 0, duration));
      else if (e.key === '0' || e.code === 'Home') setTime(0);
    };
    window.addEventListener('keydown', onKey);
    return () => window.removeEventListener('keydown', onKey);
  }, [duration]);

  React.useEffect(() => {
    if (time < duration) {
      completedRef.current = false;
      return;
    }
    if (!loop && !playing && !completedRef.current) {
      completedRef.current = true;
      if (typeof onComplete === 'function') onComplete();
    }
  }, [time, duration, loop, playing, onComplete]);

  const displayTime = hoverTime != null ? hoverTime : time;
  const ctxValue = React.useMemo(
    () => ({ time: displayTime, duration, playing, setTime, setPlaying }),
    [displayTime, duration, playing]
  );

  return (
    <div ref={stageRef} style={{
      position: 'absolute', inset: 0,
      display: 'flex', flexDirection: 'column', alignItems: 'center',
      background: '#0a0a0a',
    }}>
      <div style={{
        flex: 1, width: '100%',
        display: 'flex', alignItems: 'center', justifyContent: 'center',
        overflow: 'hidden', minHeight: 0,
      }}>
        <div style={{
          width, height, background,
          position: 'relative',
          transform: `scale(${scale})`,
          transformOrigin: 'center',
          flexShrink: 0,
          boxShadow: '0 20px 60px rgba(0,0,0,0.4)',
          overflow: 'hidden',
        }}>
          <TimelineContext.Provider value={ctxValue}>
            {children}
          </TimelineContext.Provider>
        </div>
      </div>
      {isAdminMode && (
        <PlaybackBar
          time={displayTime} duration={duration} playing={playing}
          onPlayPause={() => setPlaying(p => !p)}
          onReset={() => setTime(0)}
          onSeek={(t) => setTime(t)}
          onHover={(t) => setHoverTime(t)}
        />
      )}
    </div>
  );
}

function PlaybackBar({ time, duration, playing, onPlayPause, onReset, onSeek, onHover }) {
  const trackRef = React.useRef(null);
  const [dragging, setDragging] = React.useState(false);
  const timeFromEvent = React.useCallback((e) => {
    const rect = trackRef.current.getBoundingClientRect();
    const cx = e.touches ? e.touches[0].clientX : e.clientX;
    const x = clamp((cx - rect.left) / rect.width, 0, 1);
    return x * duration;
  }, [duration]);
  const onTrackDown = (e) => { setDragging(true); onSeek(timeFromEvent(e)); onHover(null); };
  React.useEffect(() => {
    if (!dragging) return;
    const onUp = () => setDragging(false);
    const onMove = (e) => { if (trackRef.current) onSeek(timeFromEvent(e)); };
    window.addEventListener('mouseup', onUp);
    window.addEventListener('mousemove', onMove);
    window.addEventListener('touchend', onUp);
    window.addEventListener('touchmove', onMove);
    return () => {
      window.removeEventListener('mouseup', onUp);
      window.removeEventListener('mousemove', onMove);
      window.removeEventListener('touchend', onUp);
      window.removeEventListener('touchmove', onMove);
    };
  }, [dragging, timeFromEvent, onSeek]);
  const pct = duration > 0 ? (time / duration) * 100 : 0;
  const fmt = (t) => {
    const total = Math.max(0, t);
    const m = Math.floor(total / 60);
    const s = Math.floor(total % 60);
    const cs = Math.floor((total * 100) % 100);
    return `${m}:${String(s).padStart(2, '0')}.${String(cs).padStart(2, '0')}`;
  };
  const mono = 'JetBrains Mono, ui-monospace, monospace';
  return (
    <div style={{
      display: 'flex', alignItems: 'center', gap: 12,
      padding: '8px 16px', background: 'rgba(20,20,20,0.92)',
      width: '100%', maxWidth: 680, alignSelf: 'center',
      borderRadius: 8, color: '#f6f4ef', userSelect: 'none', flexShrink: 0,
    }}>
      <button onClick={onReset} style={btnStyle}>↺</button>
      <button onClick={onPlayPause} style={btnStyle}>{playing ? '❚❚' : '▶'}</button>
      <div style={{ fontFamily: mono, fontSize: 12, width: 64, textAlign: 'right' }}>{fmt(time)}</div>
      <div ref={trackRef} onMouseDown={onTrackDown} onTouchStart={onTrackDown}
        style={{ flex: 1, height: 22, position: 'relative', cursor: 'pointer', display: 'flex', alignItems: 'center' }}>
        <div style={{ position: 'absolute', left: 0, right: 0, height: 4, background: 'rgba(255,255,255,0.12)', borderRadius: 2 }} />
        <div style={{ position: 'absolute', left: 0, width: `${pct}%`, height: 4, background: 'oklch(72% 0.12 250)', borderRadius: 2 }} />
        <div style={{ position: 'absolute', left: `${pct}%`, top: '50%', width: 12, height: 12, marginLeft: -6, marginTop: -6, background: '#fff', borderRadius: 6 }} />
      </div>
      <div style={{ fontFamily: mono, fontSize: 12, width: 64, color: 'rgba(246,244,239,0.55)' }}>{fmt(duration)}</div>
    </div>
  );
}
const btnStyle = {
  width: 28, height: 28, display: 'flex', alignItems: 'center', justifyContent: 'center',
  background: 'rgba(255,255,255,0.08)', border: '1px solid rgba(255,255,255,0.1)',
  borderRadius: 6, color: '#f6f4ef', cursor: 'pointer', padding: 0, fontSize: 12,
};

// ── data-field (PC 1920×1080, 7-column grid with active highlight) ─────────
const RED = '#E63946';
const FG  = '#f5f3ee';
const DIM = '#5a5550';
const FAINT = '#2a2724';

const COLUMN_TOKENS = [
  // 0 — 소방시설 탐색기
  ['1,200㎡', 'F12', 'B2', '연면적', '스프링클러', '감지기', '옥내소화전', '유도등', '제연', '지상11층', '의무설치', 'SP', '500㎡↑', 'IND', '11F'],
  // 1 — 다중이용업소 탐색기
  ['노래연습장', 'PC방', '고시원', '음식점', '150㎡', '2층↑', '복층', '영업장', 'KARA', 'NET', 'F&B', 'MUL', '판정', '안전시설', 'M.U.'],
  // 2 — 법정기한 계산기
  ['D-7', '2026.05.16', '30일', '선임 60일', '점검일', '제출 7일', 'D-14', '01.31', '06.30', '부적합', '조치기한', 'CAL', 'YYYY/MM', 'D-2', 'DUE'],
  // 3 — 자체점검 가이드
  ['P.1', 'P.4', 'P.8', '별표 4', '제5조', '표지', '점검표', '대상물', '✓', '✕', '작동', '종합', '대상', '항목', '제출'],
  // 4 — 소방시설 도감
  ['옥내소화전', '자탐', '비상방송설비', '구성', '기준', '소화기', '경보기', '비상조명', 'kW', 'L/min', 'Ø50', 'SPEC', '유도등', '스프링클러', '소방서장'],
  // 5 — 유틸리티 도구함
  ['1.9㎡/人', '300人', '강의실', '숙박', '판매', '식당', '바닥면적', '수용인원', 'OCC', 'CAP', '보조자', '선임', '÷1.9', 'CALC', '名'],
];

const COLUMNS = 6;
const PER_COL = 12;
const STAGE_W = 1920;
const STAGE_H = 1080;
const COL_W = STAGE_W / COLUMNS;
const TOP_PAD = 110;
const BOT_PAD = 110;

function mulberry32(seed) {
  let a = seed >>> 0;
  return () => {
    a = (a + 0x6d2b79f5) >>> 0;
    let t = a;
    t = Math.imul(t ^ (t >>> 15), t | 1);
    t ^= t + Math.imul(t ^ (t >>> 7), t | 61);
    return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
  };
}

function buildParticles() {
  const rng = mulberry32(20260509);
  const list = [];
  const goldenAngle = Math.PI * (3 - Math.sqrt(5));
  let placeIdx = 0;
  for (let c = 0; c < COLUMNS; c++) {
    const tokens = COLUMN_TOKENS[c];
    for (let i = 0; i < PER_COL; i++) {
      const baseAngle = placeIdx * goldenAngle;
      const angle = baseAngle + (rng() - 0.5) * 0.9;
      placeIdx++;
      const minR = 460;
      const maxR = 1080;
      const rNorm = Math.sqrt(rng());
      const r = minR + rNorm * (maxR - minR);
      const cx = STAGE_W / 2 + Math.cos(angle) * r * 1.1;
      const cy = STAGE_H / 2 + Math.sin(angle) * r * 0.78;
      const colX = COL_W * c + COL_W / 2;
      const usableH = STAGE_H - TOP_PAD - BOT_PAD;
      const rowY = TOP_PAD + (usableH * (i + 0.5)) / PER_COL;
      const jitterX = (rng() - 0.5) * (COL_W * 0.55);
      const jitterY = (rng() - 0.5) * 14;
      const driftRadius = 32 + rng() * 130;
      const driftSpeed = 0.22 + rng() * 0.6;
      const driftPhase = rng() * Math.PI * 2;
      const driftPhase2 = rng() * Math.PI * 2;
      const orderDelay = rng() * 1.2;
      const transitionDur = 1.4 + rng() * 0.6;
      const text = tokens[i % tokens.length];
      const sizeRoll = rng();
      const size = sizeRoll < 0.15 ? 28 : sizeRoll < 0.45 ? 18 : sizeRoll < 0.8 ? 14 : 11;
      const isMono = rng() < 0.55;
      const weight = sizeRoll < 0.15 ? 700 : (rng() < 0.4 ? 500 : 400);
      const opacityCalm = 0.42 + rng() * 0.4;
      const rotChaos = (rng() - 0.5) * 24;
      list.push({
        id: c * 100 + i, col: c, cx, cy,
        ox: colX + jitterX, oy: rowY + jitterY,
        driftRadius, driftSpeed, driftPhase, driftPhase2,
        orderDelay, transitionDur,
        text, size, weight, isMono, opacityCalm, rotChaos,
      });
    }
  }
  return list;
}

const PARTICLES = buildParticles();
const CHAOS_END = 6.0;
const ORDER_FULL = 8.3;

function ColumnDividers({ t, activeFeature }) {
  const lineOpacity = clamp((t - (CHAOS_END + 0.3)) / 1.6, 0, 1) * 0.18;
  if (lineOpacity < 0.005) return null;
  const lines = [];
  for (let c = 1; c < COLUMNS; c++) {
    lines.push(
      <div key={c} style={{
        position: 'absolute', left: COL_W * c, top: 60, bottom: 60,
        width: 1, background: FAINT, opacity: lineOpacity,
      }} />
    );
  }
  if (activeFeature >= 0) {
    lines.push(
      <div key={'hl'} style={{
        position: 'absolute', left: COL_W * activeFeature, top: 60, bottom: 60,
        width: COL_W,
        background: `linear-gradient(180deg, transparent, ${RED}14 30%, ${RED}14 70%, transparent)`,
        borderLeft: `1px solid ${RED}55`,
        borderRight: `1px solid ${RED}55`,
        transition: 'left 600ms cubic-bezier(0.7, 0, 0.2, 1)',
      }} />
    );
  }
  return <>{lines}</>;
}

function DataField({ activeFeature = -1, dimGlobal = 0 }) {
  const t = useTime();
  return (
    <div style={{ position: 'absolute', inset: 0, pointerEvents: 'none', fontFamily: 'Helvetica Neue, Helvetica, Arial, sans-serif' }}>
      <ColumnDividers t={t} activeFeature={activeFeature} />
      {PARTICLES.map((p) => {
        const myStart = CHAOS_END + p.orderDelay;
        const myEnd = myStart + p.transitionDur;
        const dx = Math.cos(t * p.driftSpeed + p.driftPhase) * p.driftRadius;
        const dy = Math.sin(t * p.driftSpeed * 0.8 + p.driftPhase2) * p.driftRadius * 0.6;
        const chaosX = p.cx + dx;
        const chaosY = p.cy + dy;
        const breathe = Math.sin(t * 0.4 + p.driftPhase) * 1.2;
        const breathe2 = Math.sin(t * 0.55 + p.driftPhase2) * 1.0;
        const orderX = p.ox + breathe;
        const orderY = p.oy + breathe2;
        let progress = 0;
        if (t >= myEnd) progress = 1;
        else if (t > myStart) {
          const local = (t - myStart) / p.transitionDur;
          progress = Easing.easeInOutCubic(clamp(local, 0, 1));
        }
        const x = chaosX + (orderX - chaosX) * progress;
        const y = chaosY + (orderY - chaosY) * progress;
        const rot = p.rotChaos * (1 - progress);
        const isActiveCol = p.col === activeFeature;
        const baseColor = progress < 0.5 ? DIM : FG;
        const color = isActiveCol ? RED : baseColor;
        let opacity;
        if (t < 0.4) opacity = (t / 0.4) * 0.85;
        else if (progress < 1) opacity = 0.78 + progress * (p.opacityCalm - 0.78);
        else opacity = p.opacityCalm;
        if (isActiveCol) opacity = Math.min(1, opacity + 0.45);
        opacity *= (1 - dimGlobal);
        const fontFamily = p.isMono
          ? 'JetBrains Mono, ui-monospace, monospace'
          : 'Helvetica Neue, Helvetica, Arial, sans-serif';
        return (
          <div key={p.id} style={{
            position: 'absolute', left: x, top: y,
            transform: `translate(-50%, -50%) rotate(${rot}deg)`,
            color, opacity, fontFamily,
            fontSize: p.size, fontWeight: p.weight,
            letterSpacing: p.isMono ? '0.04em' : '-0.005em',
            whiteSpace: 'nowrap',
            transition: isActiveCol ? 'color 200ms ease' : 'none',
            willChange: 'transform, opacity, color',
          }}>{p.text}</div>
        );
      })}
    </div>
  );
}

// ── feature cards (PC) ──────────────────────────────────────────────────────
const FEATURES = [
  { num: '01', title: '소방시설 탐색기', titleEn: 'FACILITY EXPLORER', desc: '건물 정보를 입력하면\n법정 의무 설치 소방시설을 도출합니다.' },
  { num: '02', title: '다중이용업소 탐색기', titleEn: 'MULTI-USE EXPLORER', desc: '다중이용업소 해당여부를 판별하고\n설치해야할 안전시설을 도출합니다.' },
  { num: '03', title: '법정기한 계산기', titleEn: 'DATE CALCULATOR', desc: '자체점검·안전관리자 등 선임 ·부적합 조치\n법정 기한을 자동 산정합니다.' },
  { num: '04', title: '자체점검 가이드', titleEn: 'INSPECTION GUIDE', desc: '작동/종합 대상 판정과\n자체점검 보고서 작성·읽기 요령을 안내합니다.' },
  { num: '05', title: '소방시설 도감', titleEn: 'FACILITY ATLAS', desc: '소방시설 개요·종류·구성·설치기준 등을\n쉽게 정리해 보여줍니다.' },
  { num: '06', title: '유틸리티 도구함', titleEn: 'UTILITY TOOLKIT', desc: '특정소방대상물의 수용인원과\n선임해야할 소방안전관리보조자 수를 산정합니다.' },
];

function FeatureCard({ feature, colIndex }) {
  const { localTime, duration } = useSprite();
  const colCenter = COL_W * colIndex + COL_W / 2;
  const numProg = clamp(localTime / 0.6, 0, 1);
  const numEase = Easing.easeOutCubic(numProg);
  const numX = -120 + numEase * 120;
  const titleStart = 0.35;
  const titleProg = clamp((localTime - titleStart) / 0.55, 0, 1);
  const titleEase = Easing.easeOutCubic(titleProg);
  const titleY = (1 - titleEase) * 28;
  const descStart = 0.75;
  const descProg = clamp((localTime - descStart) / 0.6, 0, 1);
  const descY = (1 - descProg) * 16;
  const exitStart = duration - 0.55;
  let exitOpacity = 1;
  let exitX = 0;
  if (localTime > exitStart) {
    const e = clamp((localTime - exitStart) / 0.55, 0, 1);
    const eased = Easing.easeInCubic(e);
    exitOpacity = 1 - eased;
    exitX = -eased * 60;
  }
  const connectorProg = clamp((localTime - 0.5) / 0.6, 0, 1);
  return (
    <div style={{ position: 'absolute', inset: 0, opacity: exitOpacity, transform: `translateX(${exitX}px)`, fontFamily: 'Helvetica Neue, Helvetica, Arial, sans-serif' }}>
      <div style={{
        position: 'absolute', left: 110, top: 230,
        width: 1100, height: 620,
        background: 'radial-gradient(ellipse at 30% 50%, rgba(5,5,5,0.78) 0%, rgba(5,5,5,0.6) 40%, rgba(5,5,5,0) 78%)',
        opacity: titleEase * 0.95, pointerEvents: 'none',
      }} />
      <div style={{
        position: 'absolute', left: 140 + numX, top: 280,
        opacity: numEase,
        fontSize: 240, fontWeight: 900, lineHeight: 0.85, letterSpacing: '-0.05em',
        color: 'transparent', WebkitTextStroke: `2px ${RED}`,
      }}>{feature.num}</div>
      <div style={{
        position: 'absolute', left: 150, top: 540,
        opacity: titleEase * 0.9, transform: `translateY(${titleY * 0.5}px)`,
        fontFamily: 'JetBrains Mono, ui-monospace, monospace',
        fontSize: 14, letterSpacing: '0.32em', color: RED, fontWeight: 500,
      }}>{feature.titleEn}</div>
      <div style={{
        position: 'absolute', left: 150, top: 575,
        opacity: titleEase, transform: `translateY(${titleY}px)`,
        fontSize: 96, fontWeight: 900, letterSpacing: '-0.03em',
        color: FG, lineHeight: 1.0, whiteSpace: 'nowrap',
      }}>{feature.title}</div>
      <div style={{
        position: 'absolute', left: 150, top: 695,
        height: 4, width: 120 * descProg,
        background: RED, opacity: descProg,
      }} />
      <div style={{
        position: 'absolute', left: 150, top: 720,
        opacity: descProg, transform: `translateY(${descY}px)`,
        fontSize: 28, fontWeight: 400, color: '#cfcbc4',
        lineHeight: 1.5, whiteSpace: 'pre-line',
        letterSpacing: '-0.005em', maxWidth: 760,
      }}>{feature.desc}</div>
      <div style={{
        position: 'absolute', left: colCenter - 7, top: 60,
        width: 14, height: 14, background: RED,
        opacity: connectorProg, transform: `scale(${connectorProg})`,
      }} />
      <div style={{
        position: 'absolute', left: colCenter - 0.5, top: 74,
        width: 1, height: 80 * connectorProg,
        background: `linear-gradient(180deg, ${RED}, transparent)`,
        opacity: connectorProg,
      }} />
      <StepCounter active={colIndex} />
    </div>
  );
}

function StepCounter({ active }) {
  return (
    <div style={{
      position: 'absolute', right: 80, bottom: 80,
      display: 'flex', gap: 14, alignItems: 'center',
      fontFamily: 'JetBrains Mono, ui-monospace, monospace',
      fontSize: 14, letterSpacing: '0.18em', color: '#807a72',
    }}>
      <span>{String(active + 1).padStart(2, '0')}</span>
      <div style={{ display: 'flex', gap: 6 }}>
        {Array.from({ length: 6 }).map((_, i) => (
          <div key={i} style={{
            width: i === active ? 28 : 12, height: 3,
            background: i === active ? RED : '#3a3530',
            transition: 'all 240ms ease',
          }} />
        ))}
      </div>
      <span>06</span>
    </div>
  );
}

// ── app composition ────────────────────────────────────────────────────────
const TOTAL = 41;
const SCHEDULE = [
  { start:  9.5, end: 13.5, col: 0 },
  { start: 13.5, end: 17.5, col: 1 },
  { start: 17.5, end: 21.5, col: 2 },
  { start: 21.5, end: 25.5, col: 3 },
  { start: 25.5, end: 29.5, col: 4 },
  { start: 29.5, end: 33.5, col: 5 },
];

function ActiveColumnTracker({ children }) {
  const t = useTime();
  let active = -1;
  for (const s of SCHEDULE) {
    if (t >= s.start && t < s.end) { active = s.col; break; }
  }
  return children(active);
}

function IntroText() {
  const t = useTime();
  const kickA = clamp((t - 0.4) / 0.7, 0, 1);
  const kickAOut = clamp((t - 3.5) / 0.5, 0, 1);
  const kickAOpacity = kickA * (1 - kickAOut);
  const kickC = clamp((t - 4.0) / 0.6, 0, 1);
  const kickCOut = clamp((t - 6.0) / 0.4, 0, 1);
  const kickCOpacity = kickC * (1 - kickCOut);
  const labelIn = clamp((t - 6.5) / 0.7, 0, 1);
  const labelOut = clamp((t - 9.0) / 0.5, 0, 1);
  const labelOpacity = labelIn * (1 - labelOut);
  return (
    <>
      <div style={{
        position: 'absolute', left: '50%', top: '50%',
        transform: `translate(-50%, -50%)`, opacity: kickAOpacity,
        textAlign: 'center', fontFamily: 'Helvetica Neue, Helvetica, Arial, sans-serif',
        pointerEvents: 'none',
      }}>
        <div style={{
          fontFamily: 'JetBrains Mono, ui-monospace, monospace',
          fontSize: 14, letterSpacing: '0.4em', color: RED, fontWeight: 500,
          marginBottom: 22,
        }}>FIRE SAFETY ASSISTANT</div>
        <div style={{
          fontSize: 116, fontWeight: 900, color: FG,
          letterSpacing: '-0.04em', lineHeight: 1.15,
        }}>예방업무는<br />복잡합니다.</div>
        <div style={{
          marginTop: 28, fontSize: 40, color: '#a8a39c',
          letterSpacing: '-0.05em', fontWeight: 400,
        }}>면적 · 층수 · 용도 · 기한 · 법령 · 시설 · 점검 · 판정</div>
      </div>
      <div style={{
        position: 'absolute', left: '50%', top: '50%',
        transform: `translate(-50%, -50%)`, opacity: kickCOpacity,
        textAlign: 'center', fontFamily: 'Helvetica Neue, Helvetica, Arial, sans-serif',
        pointerEvents: 'none',
        whiteSpace: 'nowrap',
      }}>
        <div style={{
          fontFamily: 'JetBrains Mono, ui-monospace, monospace',
          fontSize: 14, letterSpacing: '0.4em', color: RED, fontWeight: 500,
          marginBottom: 22,
        }}>WITHOUT US</div>
        <div style={{
          fontSize: 116, fontWeight: 900, color: FG,
          letterSpacing: '-0.04em', lineHeight: 1.0,
        }}>이 사이트가 없다면 말이죠</div>
      </div>
      <div style={{
        position: 'absolute', left: '50%', top: '50%',
        transform: `translate(-50%, -50%)`, opacity: labelOpacity,
        textAlign: 'center', fontFamily: 'Helvetica Neue, Helvetica, Arial, sans-serif',
        pointerEvents: 'none',
      }}>
        <div style={{
          fontFamily: 'JetBrains Mono, ui-monospace, monospace',
          fontSize: 14, letterSpacing: '0.4em', color: RED, fontWeight: 500,
          marginBottom: 22,
        }}>6 TOOLS · ONE WORKBENCH</div>
        <div style={{
          fontSize: 116, fontWeight: 900, color: FG,
          letterSpacing: '-0.04em', lineHeight: 0.92,
          whiteSpace: 'nowrap',
        }}>이제, 쉽게 정리됩니다.</div>
      </div>
    </>
  );
}

function Outro() {
  const t = useTime();
  const localStart = 33.8;
  if (t < localStart - 0.4) return null;
  const local = t - localStart;
  const inProg = clamp(local / 0.9, 0, 1);
  const eased = Easing.easeOutCubic(inProg);
  const opacity = eased;
  const ty = (1 - eased) * 24;
  const descProg = clamp((local - 0.6) / 0.8, 0, 1);
  const dotsProg = clamp((local - 2.4) / 0.6, 0, 1);
  return (
    <div style={{ position: 'absolute', inset: 0, pointerEvents: 'none', fontFamily: 'Helvetica Neue, Helvetica, Arial, sans-serif' }}>
      <div style={{
        position: 'absolute', inset: 0,
        background: 'radial-gradient(ellipse at 50% 55%, rgba(5,5,5,0.92) 0%, rgba(5,5,5,0.78) 45%, rgba(5,5,5,0.5) 80%)',
        opacity,
      }} />
      <div style={{
        position: 'absolute', left: '50%', top: 360,
        transform: `translate(-50%, ${ty}px)`,
        opacity, textAlign: 'center',
      }}>
        <div style={{
          fontFamily: 'JetBrains Mono, ui-monospace, monospace',
          fontSize: 16, letterSpacing: '0.42em', color: RED,
          fontWeight: 500, marginBottom: 36,
        }}>FIRE SAFETY ASSISTANT</div>
        <div style={{
          fontSize: 168, fontWeight: 900, color: FG,
          letterSpacing: '-0.045em', lineHeight: 0.92,
          whiteSpace: 'nowrap',
        }}>예방업무 <span style={{ color: RED }}>어시스턴트</span></div>
      </div>
      <div style={{
        position: 'absolute', left: '50%', top: 700,
        transform: 'translateX(-50%)', opacity: descProg,
        textAlign: 'center', fontSize: 30, color: '#cfcbc4',
        fontWeight: 400, letterSpacing: '-0.005em', lineHeight: 1.45,
      }}>복잡한 소방법령 탐색과 기한 계산,<br />이제 한 화면에서 끝냅니다.</div>
      {(() => {
        const blinkT = Math.max(0, local - 2.8);
        const sel = Math.floor(blinkT * 1.4) % 2;
        const cursorBlink = Math.sin(blinkT * 12) > -0.3 ? 1 : 0;
        return (
          <div style={{
            position: 'absolute', left: '50%', top: 830,
            transform: 'translateX(-50%)',
            opacity: dotsProg, textAlign: 'center',
            fontFamily: 'JetBrains Mono, ui-monospace, monospace',
          }}>
            <div style={{
              fontSize: 44, fontWeight: 700, color: RED,
              letterSpacing: '0.22em', marginBottom: 26,
            }}>CONTINUE?</div>
            <div style={{
              fontSize: 36, fontWeight: 700,
              letterSpacing: '0.16em',
              display: 'flex', gap: 70, justifyContent: 'center',
            }}>
              <span style={{ color: sel === 0 ? RED : '#5a5550', position: 'relative' }}>
                <span style={{ position: 'absolute', left: -32, top: 0, opacity: sel === 0 ? cursorBlink : 0 }}>▸</span>
                YES
              </span>
              <span style={{ color: sel === 1 ? RED : '#5a5550', position: 'relative' }}>
                <span style={{ position: 'absolute', left: -32, top: 0, opacity: sel === 1 ? cursorBlink : 0 }}>▸</span>
                YES
              </span>
            </div>
          </div>
        );
      })()}
    </div>
  );
}

function DataFieldDimWrapper({ active }) {
  const t = useTime();
  const outroDim = clamp((t - 33.8) / 0.8, 0, 1) * 0.55;
  const cardDim = clamp((t - 9.5) / 1.5, 0, 1) * 0.35;
  const dim = Math.max(outroDim, cardDim);
  return <DataField activeFeature={active} dimGlobal={dim} />;
}

function App() {
  const handleComplete = React.useCallback(() => {
    try { window.parent.postMessage({ type: 'INTRO_DONE' }, '*'); } catch {}
  }, []);

  return (
    <Stage
      width={STAGE_W} height={STAGE_H}
      duration={TOTAL} background="#050505"
      loop={false}
      persistKey="fire-intro"
      onComplete={handleComplete}
    >
      <ActiveColumnTracker>
        {(active) => (
          <>
            <DataFieldDimWrapper active={active} />
            <IntroText />
            {SCHEDULE.map((s, i) => (
              <Sprite key={i} start={s.start} end={s.end}>
                <FeatureCard feature={FEATURES[i]} colIndex={s.col} />
              </Sprite>
            ))}
            <Outro />
          </>
        )}
      </ActiveColumnTracker>
    </Stage>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>

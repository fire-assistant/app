name: Fetch Korean Holidays

on:
  schedule:
    - cron: '0 15 * * *'   # 매일 자정 KST (UTC 15:00)
  workflow_dispatch:         # GitHub에서 수동 실행 가능

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch holidays from 공공데이터포털
        env:
          HOLIDAY_API_KEY: ${{ secrets.HOLIDAY_API_KEY }}
        run: |
          python3 << 'EOF'
          import urllib.request
          import urllib.parse
          import json
          import datetime
          import os

          api_key = os.environ["HOLIDAY_API_KEY"]
          current_year = datetime.datetime.now().year
          holidays = {}

          for year in [current_year, current_year + 1]:
              url = (
                  "https://apis.data.go.kr/B090041/openapi/service"
                  "/SpcdeInfoService/getRestDeInfo"
                  f"?serviceKey={urllib.parse.quote(api_key, safe='')}"
                  f"&solYear={year}&_type=json&numOfRows=100"
              )
              try:
                  with urllib.request.urlopen(url, timeout=10) as resp:
                      data = json.loads(resp.read())
                  items = data["response"]["body"]["items"]["item"]
                  if isinstance(items, dict):
                      items = [items]
                  dates = [
                      f"{str(item['locdate'])[:4]}-{str(item['locdate'])[4:6]}-{str(item['locdate'])[6:8]}"
                      for item in items
                      if item.get("isHoliday") == "Y"
                  ]
                  holidays[str(year)] = sorted(dates)
                  print(f"{year}: {len(dates)}개 공휴일")
              except Exception as e:
                  print(f"{year} 오류: {e}")
                  holidays[str(year)] = []

          out_path = "docs/holidays.json"
          with open(out_path, "w", encoding="utf-8") as f:
              json.dump(holidays, f, ensure_ascii=False, indent=2)
          print("저장 완료:", out_path)
          EOF

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/holidays.json
          git diff --staged --quiet || (
            git commit -m "update: holidays $(date +%Y-%m-%d)"
            git push
          )

name: Deploy Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# 핵심: 이전 배포가 진행 중이면 취소하고 새 배포 진행 → "in progress deployment" 400 충돌 방지
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    # appsite(fire-assistant/app)와 fireapp(carrotcakehope) 둘 다 실행.
    # fireapp도 legacy(branch/docs)→workflow 전환: legacy는 stuck 빌드 자동복구가 없어
    # 한 번 끼면 후속 배포가 줄줄이 "in progress" 400으로 실패(실패메일 연쇄)했기 때문.
    # workflow는 아래 concurrency cancel-in-progress + 재시도로 흡수.
    # supply-fireapp은 Pages 미사용이라 제외.
    if: github.repository == 'fire-assistant/app' || github.repository == 'carrotcakehope/fireapp'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs
      # 재시도 루프: Pages 배포가 일시적으로 "in progress"(400)로 끼면
      # run을 죽이지 않고(continue-on-error) 대기 후 재배포 → 락 풀리면 성공.
      # 최종 성공하면 run=success라 GitHub 실패 메일이 안 옴.
      - id: deployment
        uses: actions/deploy-pages@v4
        continue-on-error: true
      - name: wait before retry 1
        if: steps.deployment.outcome == 'failure'
        run: sleep 120
      - id: deployment2
        if: steps.deployment.outcome == 'failure'
        uses: actions/deploy-pages@v4
        continue-on-error: true
      - name: wait before retry 2
        if: steps.deployment.outcome == 'failure' && steps.deployment2.outcome == 'failure'
        run: sleep 180
      - id: deployment3
        if: steps.deployment.outcome == 'failure' && steps.deployment2.outcome == 'failure'
        uses: actions/deploy-pages@v4

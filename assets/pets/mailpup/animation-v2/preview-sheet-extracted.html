<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Firefighter Pup Sheet Extracted Preview</title>
  <style>
    :root {
      color-scheme: dark;
      font-family: Arial, sans-serif;
      background: #101317;
      color: #f5f1e8;
    }

    body {
      margin: 0;
      padding: 24px;
    }

    h1 {
      margin: 0 0 6px;
      font-size: 24px;
      letter-spacing: 0;
    }

    p {
      margin: 0 0 20px;
      color: #aeb7c2;
    }

    .grid {
      display: grid;
      gap: 16px;
    }

    .row {
      border: 1px solid #34404d;
      border-radius: 8px;
      padding: 14px;
      background: #191f26;
    }

    .title {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 10px;
      font-weight: 700;
    }

    .status {
      color: #ffcc66;
      font-weight: 400;
      font-size: 13px;
    }

    .stage {
      overflow-x: auto;
      padding: 12px;
      border-radius: 6px;
      background:
        linear-gradient(45deg, rgba(255,255,255,0.08) 25%, transparent 25%),
        linear-gradient(-45deg, rgba(255,255,255,0.08) 25%, transparent 25%),
        linear-gradient(45deg, transparent 75%, rgba(255,255,255,0.08) 75%),
        linear-gradient(-45deg, transparent 75%, rgba(255,255,255,0.08) 75%),
        #0f141a;
      background-position: 0 0, 0 8px, 8px -8px, -8px 0;
      background-size: 16px 16px;
    }

    img {
      display: block;
      height: 208px;
      image-rendering: pixelated;
    }
  </style>
</head>
<body>
  <h1>Firefighter Pup Sheet Extracted Preview</h1>
  <p>Extracted from the Phase 1 concept sheet. Source atlas remains unchanged.</p>
  <div class="grid">
    <section class="row"><div class="title"><span>surprised</span><span class="status">6 frames</span></div><div class="stage"><img src="sheet-extracted/surprised.png" alt="surprised"></div></section>
    <section class="row"><div class="title"><span>clap</span><span class="status">6 frames</span></div><div class="stage"><img src="sheet-extracted/clap.png" alt="clap"></div></section>
    <section class="row"><div class="title"><span>idle_tail</span><span class="status">4 frames</span></div><div class="stage"><img src="sheet-extracted/idle_tail.png" alt="idle tail"></div></section>
    <section class="row"><div class="title"><span>salute</span><span class="status">6 frames</span></div><div class="stage"><img src="sheet-extracted/salute.png" alt="salute"></div></section>
    <section class="row"><div class="title"><span>sleepy</span><span class="status">5 frames</span></div><div class="stage"><img src="sheet-extracted/sleepy.png" alt="sleepy"></div></section>
    <section class="row"><div class="title"><span>sulk</span><span class="status">5 frames</span></div><div class="stage"><img src="sheet-extracted/sulk.png" alt="sulk"></div></section>
    <section class="row"><div class="title"><span>eat</span><span class="status">6 frames</span></div><div class="stage"><img src="sheet-extracted/eat.png" alt="eat"></div></section>
    <section class="row"><div class="title"><span>happy_jump</span><span class="status">8 frames</span></div><div class="stage"><img src="sheet-extracted/happy_jump.png" alt="happy jump"></div></section>
  </div>
</body>
</html>
